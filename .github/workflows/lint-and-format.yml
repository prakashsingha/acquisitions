name: Lint and Format

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  lint-and-format:
    name: ESLint & Prettier
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        continue-on-error: true
        run: npm run lint

      - name: Run Prettier check
        id: prettier
        continue-on-error: true
        run: npm run format:check

      - name: Annotate ESLint failures
        if: steps.eslint.outcome == 'failure'
        run: |
          echo "::error title=ESLint failed::Code style or lint issues were found. Run 'npm run lint:fix' locally to auto-fix many issues, then commit the changes."
          echo "::notice title=Fix ESLint issues::npm run lint:fix"

      - name: Annotate Prettier failures
        if: steps.prettier.outcome == 'failure'
        run: |
          echo "::error title=Prettier check failed::Formatting does not match project style. Run 'npm run format' locally to fix formatting, then commit the changes."
          echo "::notice title=Fix formatting::npm run format"

      - name: Fail workflow on lint or format errors
        if: steps.eslint.outcome == 'failure' || steps.prettier.outcome == 'failure'
        run: exit 1
