name: Tests

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  test:
    name: Jest
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      NODE_OPTIONS: --experimental-vm-modules
      DATABASE_URL: ${{ secrets.DATABASE_URL != '' && secrets.DATABASE_URL || 'postgres://test:test@localhost:5432/test?sslmode=disable' }}
      JWT_SECRET: test-jwt-secret
      ARCJET_KEY: ${{ secrets.ARCJET_KEY != '' && secrets.ARCJET_KEY || 'ajkey_test_placeholder_for_ci' }}
      ARCJET_ENV: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: test
        run: npm test -- --ci --coverage --coverageReporters=text --coverageReporters=lcov --coverageReporters=json-summary 2>&1 | tee test-output.txt

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage/
            test-output.txt
          retention-days: 30

      - name: Generate test summary
        if: always()
        run: |
          {
            echo "## Test Results"
            echo ""
            if [ "${{ steps.test.outcome }}" = "success" ]; then
              echo "✅ All tests passed."
            else
              echo "❌ Tests failed. See job logs and annotations for details."
            fi
            echo ""
            if [ -f coverage/coverage-summary.json ]; then
              echo "### Coverage"
              echo ""
              echo "| Metric | Covered | Total | % |"
              echo "|--------|---------|-------|---|"
              node -e "
                const s = require('./coverage/coverage-summary.json').total;
                for (const [k, v] of Object.entries(s)) {
                  console.log(\`| \${k} | \${v.covered} | \${v.total} | \${v.pct}% |\`);
                }
              "
            else
              echo "_Coverage summary not available._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Annotate test failures
        if: failure() && steps.test.outcome == 'failure'
        run: |
          echo "::error title=Tests failed::One or more tests did not pass. Review the test output artifact and job logs."
          if [ -f test-output.txt ]; then
            grep -E '^(FAIL|  ●|Tests:)' test-output.txt | head -40 | while IFS= read -r line; do
              echo "::error title=Test failure::${line}"
            done || true
          fi
